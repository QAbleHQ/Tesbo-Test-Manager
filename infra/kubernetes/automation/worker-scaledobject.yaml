apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: automation-worker
  namespace: bettercases-automation
spec:
  scaleTargetRef:
    name: automation-worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 50
  triggers:
    - type: redis
      metadata:
        address: tesbo-redis-do-user-19433638-0.a.db.ondigitalocean.com:25061
        listName: bull:automation-execution-jobs:wait
        listLength: "2"
        enableTLS: "true"
        unsafeSsl: "true"
      authenticationRef:
        name: redis-trigger-auth
