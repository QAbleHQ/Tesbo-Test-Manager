apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-api
  namespace: bettercases-automation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automation-api
  template:
    metadata:
      labels:
        app: automation-api
    spec:
      containers:
        - name: automation-api
          image: registry.digitalocean.com/REPLACE_ME/automation-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7400
          env:
            - name: PORT
              value: "7400"
            - name: AUTOMATION_SERVICE_ROLE
              value: "api"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: redis-url
            - name: AUTOMATION_QUEUE_PREFIX
              value: "bull"
            - name: AUTOMATION_QUEUE_NAME
              value: "automation-execution-jobs"
            - name: AUTOMATION_QUEUE_ENABLED
              value: "true"
            - name: BACKEND_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: backend-base-url
            - name: AUTOMATION_QUEUE_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: queue-shared-token
            - name: AGENT_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: agent-shared-token
          readinessProbe:
            httpGet:
              path: /health
              port: 7400
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7400
            initialDelaySeconds: 20
            periodSeconds: 20
