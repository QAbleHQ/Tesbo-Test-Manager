apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-api
  namespace: bettercases-automation
  labels:
    app: automation-api
    app.kubernetes.io/part-of: tesbo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automation-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: automation-api
    spec:
      imagePullSecrets:
        - name: docr-registry
      containers:
        - name: automation-api
          image: registry.digitalocean.com/bettercases/tesbo-test-runner-agents:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7410
          env:
            - name: PORT
              value: "7410"
            - name: AUTOMATION_SERVICE_ROLE
              value: "api"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: redis-url
            - name: AUTOMATION_QUEUE_PREFIX
              value: "bull"
            - name: AUTOMATION_QUEUE_NAME
              value: "automation-execution-jobs"
            - name: AUTOMATION_QUEUE_ENABLED
              value: "true"
            - name: BACKEND_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: backend-base-url
            - name: AUTOMATION_QUEUE_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: queue-shared-token
            - name: AGENT_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: agent-shared-token
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 7410
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7410
            initialDelaySeconds: 20
            periodSeconds: 20
