apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-worker
  namespace: bettercases-automation
  labels:
    app: automation-worker
    app.kubernetes.io/part-of: tesbo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: automation-worker
  template:
    metadata:
      labels:
        app: automation-worker
    spec:
      imagePullSecrets:
        - name: docr-registry
      containers:
        - name: automation-worker
          image: registry.digitalocean.com/bettercases/tesbo-test-runner-agents:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7411
          env:
            - name: PORT
              value: "7411"
            - name: AUTOMATION_SERVICE_ROLE
              value: "worker"
            - name: PLAYWRIGHT_HEADLESS
              value: "true"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: redis-url
            - name: AUTOMATION_QUEUE_PREFIX
              value: "bull"
            - name: AUTOMATION_QUEUE_NAME
              value: "automation-execution-jobs"
            - name: AUTOMATION_QUEUE_ENABLED
              value: "true"
            - name: AUTOMATION_QUEUE_CONCURRENCY
              value: "2"
            - name: AUTOMATION_QUEUE_HEARTBEAT_MS
              value: "5000"
            - name: BACKEND_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: backend-base-url
            - name: AUTOMATION_QUEUE_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: queue-shared-token
            - name: AGENT_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: automation-secrets
                  key: agent-shared-token
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 7411
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 7411
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: artifacts
          emptyDir:
            sizeLimit: 2Gi
