# Tesbo Postgres — deny-by-default host access.
# Only Unix-socket (container healthcheck) and the internal Docker subnet may connect.
# NEVER add "host all all all" — that exposes Postgres to the entire internet when a port is published.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             all             127.0.0.1/32            reject
host    all             all             ::1/128                 reject
host    all             all             172.28.0.0/24           scram-sha-256
host    all             all             0.0.0.0/0               reject
