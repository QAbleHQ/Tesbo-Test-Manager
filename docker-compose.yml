# Tesbo Test Manager one-command local deployment.
#
# Start everything:
#   docker-compose up --build -d
#   docker compose up --build -d
#
# App URLs:
#   Frontend: http://localhost:1010
#   Backend:  http://localhost:1011/health
#
# SECURITY: Postgres and Redis are on an internal-only Docker network.
# Do NOT add "ports:" mappings for postgres or redis — that exposes them to the
# public internet and will be attacked within minutes (bots scan 5432/6379 constantly).

networks:
  tesbo_internal:
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  tesbo_public:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - tesbo_internal
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tesbo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    # NOT published to the host — reachable ONLY on tesbo_internal (backend/migrator).
    expose:
      - "5432"
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - tesbo_pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - tesbo_internal
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    # NOT published to the host — password-protected, internal network only.
    expose:
      - "6379"
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --bind
      - "0.0.0.0"
      - --protected-mode
      - "yes"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: ./Tesbo-Backend-Nest
    restart: "no"
    networks:
      - tesbo_internal
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tesbo}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["npm", "run", "migrate"]

  backend:
    build:
      context: ./Tesbo-Backend-Nest
    restart: unless-stopped
    networks:
      - tesbo_internal
      - tesbo_public
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      PORT: 7000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tesbo}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:1010}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:1010,http://127.0.0.1:1010,http://localhost:3000,http://127.0.0.1:3000}
      JIRA_REDIRECT_URI: ${JIRA_REDIRECT_URI:-http://localhost:1010/jira/callback}
      POSTMARK_API_TOKEN: ${POSTMARK_API_TOKEN:-}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-noreply@example.com}
      JIRA_CLIENT_ID: ${JIRA_CLIENT_ID:-}
      JIRA_CLIENT_SECRET: ${JIRA_CLIENT_SECRET:-}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-10}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_RATE_LIMIT_WINDOW_MINUTES: ${OTP_RATE_LIMIT_WINDOW_MINUTES:-15}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
    ports:
      - "${BACKEND_PORT:-1011}:7000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:7000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./Tesbo-Frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:1011}
    restart: unless-stopped
    networks:
      - tesbo_public
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:1011}
    ports:
      - "${FRONTEND_PORT:-1010}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  tesbo_pgdata:
  backend_uploads:
