name: Bug Report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Release version, branch, or commit SHA.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node, Java, database, deployment method, or other relevant details.

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste logs or screenshots with secrets removed.
