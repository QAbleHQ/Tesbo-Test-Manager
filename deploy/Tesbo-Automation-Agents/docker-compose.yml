services:
  automation-agent:
    image: ${DOCR_REGISTRY}/${DOCR_REPO_AUTOMATION_AGENT}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    ports:
      - "80:7400"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7400/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
