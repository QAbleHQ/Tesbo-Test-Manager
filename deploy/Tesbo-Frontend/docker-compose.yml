version: "3.9"

services:
  frontend:
    image: ${DOCR_REGISTRY}/${DOCR_REPO_FRONTEND}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
