version: "3.9"

services:
  backend:
    image: ${DOCR_REGISTRY}/${DOCR_REPO_BACKEND}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    ports:
      - "127.0.0.1:7000:7000"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:7000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
