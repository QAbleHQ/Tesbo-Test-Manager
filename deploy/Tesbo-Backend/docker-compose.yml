version: "3.9"

services:
  backend:
    image: ${DOCR_REGISTRY}/${DOCR_REPO_BACKEND}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    environment:
      - JAVA_OPTS=-Xms256m -Xmx768m
    ports:
      - "80:7000"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
